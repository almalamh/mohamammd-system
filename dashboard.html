<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - نظام إدارة العهد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .dashboard-container { background: #f4f6f9; color: #333; width: 100%; max-width: 900px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .header { background: #2a5298; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .content-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .welcome-msg { font-size: 18px; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>نظام إدارة العهد والمشتريات</h1>
            <p>مرحباً بك في لوحة التحكم الرئيسية</p>
        </div>
        <div class="content-box">
            <div class="welcome-msg">🎉 أهلاً بك يا محمد، تم تسجيل دخولك بنجاح إلى النظام اليدوي للعهد.</div>
            <p>هنا ستظهر جداول العهد، والمواد الخام، والمصاريف لاحقاً بناءً على التصميم الخاص بك.</p>
        </div>
    </div>

</body>
</html>
