<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - نظام إدارة العهد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 20px; }
        .header { background: #2a5298; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 10px; }
        .welcome-msg { font-size: 18px; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>نظام إدارة العهد والمشتريات</h1>
        <p>مرحباً بك في لوحة التحكم الرئيسية</p>
    </div>

    <div class="container">
        <div class="welcome-msg">تم تسجيل دخولك بنجاح إلى النظام اليدوي للعهد.</div>
        <p>هنا ستظهر جداول العهد، والمواد الخام، والمصاريف لاحقاً بناءً على التصميم الخاص بك.</p>
    </div>

</body>
</html>
